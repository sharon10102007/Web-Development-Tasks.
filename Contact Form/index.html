<!DOCTYPE html>
<html>
<head>
    <title>Contact Form</title>
</head>
<body>
    <center>
    <table border="1" cellpadding="10">
            <tr>
                <td colspan="2" align="center">
                <h2>Contact @Bosscoder</h2>
                </td>
            </tr>    
            <tr>
                <td>Name:</td>
                <td><input type="text" name="Name" placeholder="Your name"></td>
            </tr>
            <tr>
                <td>Email:</td>
                <td><input type="text" name="Email" placeholder="Your email"></td>
            </tr>
            <tr>
                <td>Phone Number:</td>
                <td><input type="text" name="Phone Number" placeholder="Your phone number"></td>
            </tr>
            <tr>
                <td>Message:</td>
                <td><textarea name="Message" rows="4" placeholder="Write your message here..."></textarea></td>
            </tr>
            <tr>
                <td colspan="2" align="center" >
                    <button type="submit">Send Message</button>
                </td>
            </tr>
    </table>
    </center>
</body>
</html>
