<!DOCTYPE html>
<html lang="en">
<head>
    
    <title>Contact Form</title>
</head>
<body>
    
    <h1>Contact @Bosscoder</h1>
    <form>
        <table>
            <tr><b>Name:</b></tr><br>
            <tr><input type="text" placeholder="Your name"></tr><br>
            <tr><b>Email:</b></tr><br>
            <tr><input type="text" placeholder="Your email"></tr><br>
            <tr><b>Phone Number:</b></tr><br>
            <tr><input type="text" placeholder="Your phone number"></tr><br>
            <tr><b>Message:</b></tr><br>
            <textarea rows="4" placeholder="Write your message here..."></textarea><br>
            <hr><br>
            <button type="submit">Send Message</button>

        </table>
        </form>
        
</body>
</html>
